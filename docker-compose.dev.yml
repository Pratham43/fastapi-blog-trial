# ============================================================
# DEV Docker Compose
# Usage:  docker compose -f docker-compose.dev.yml up --build
# Loads:  .env.dev  (via --env-file flag or rename to .env)
# ============================================================

services:

  # ── FastAPI Backend (hot-reload) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev          # lightweight dev image
    ports:
      - "8060:8060"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_CACHE_EXPIRE_SECONDS=${REDIS_CACHE_EXPIRE_SECONDS}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - POSTS_PER_PAGE=${POSTS_PER_PAGE}
      - RESET_TOKEN_EXPIRE_MINUTES=${RESET_TOKEN_EXPIRE_MINUTES}
      - MAX_UPLOAD_SIZE_BYTES=${MAX_UPLOAD_SIZE_BYTES}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_USE_TLS=${MAIL_USE_TLS}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
    volumes:
      # Mount source code so uvicorn --reload picks up changes
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      minio:
        condition: service_healthy

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"           # exposed so you can connect with a DB GUI
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Valkey (Redis-compatible cache) ───────────────────────
  cache:
    image: valkey/valkey:8.0-alpine
    ports:
      - "6379:6379"           # exposed for redis-cli / RedisInsight
    volumes:
      - cache_data_dev:/data

  # ── MinIO (local S3-compatible object store) ──────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"           # S3 API  →  use in S3_ENDPOINT_URL
      - "9001:9001"           # Web console → http://localhost:9001
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket bootstrapper (runs once then exits) ──────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY} &&
        mc mb --ignore-existing local/${S3_BUCKET_NAME} &&
        mc anonymous set public local/${S3_BUCKET_NAME} &&
        echo 'MinIO bucket ready: ${S3_BUCKET_NAME}'
      "
    environment:
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}

volumes:
  pgdata_dev:
  cache_data_dev:
  minio_data_dev:
